services:
  mysql:
    image: mysql:8.0
    container_name: mav-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # セキュリティ向上のため外部ポートは公開しない
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mav-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?ssl_disabled=true
      - MYSQL_PWD=${MYSQL_PASSWORD}
    networks:
      - mav-network
    depends_on:
      mysql:
        condition: service_healthy
    command: ["./migrate.sh"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${PWD}/uploads:/app/uploads
    environment:
      - DEBUG=false
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRE_HOURS=24
    networks:
      - mav-network
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  mav-network:
    driver: bridge