services:
  mysql:
    image: mysql:8.0
    container_name: mav-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mav_db
      MYSQL_USER: mav_user
      MYSQL_PASSWORD: mav_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mav-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  migrate:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql+pymysql://mav_user:mav_password@mysql:3306/mav_db?ssl_disabled=true
      - MYSQL_PWD=mav_password
    networks:
      - mav-network
    depends_on:
      mysql:
        condition: service_healthy
    command: ["./migrate.sh"]

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=true
      - DATABASE_URL=mysql+pymysql://mav_user:mav_password@mysql:3306/mav_db
    networks:
      - mav-network
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - mav-network

volumes:
  mysql_data:

networks:
  mav-network:
    driver: bridge