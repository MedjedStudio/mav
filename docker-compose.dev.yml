services:
  mysql:
    image: mysql:8.0
    container_name: mav-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mav-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?ssl_disabled=true
      - MYSQL_PWD=${MYSQL_PASSWORD}
    networks:
      - mav-network
    depends_on:
      mysql:
        condition: service_healthy
    command: ["./migrate.sh"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ${PWD}/uploads:/app/uploads
    environment:
      - DEBUG=true
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-very-secure-secret-key-change-this-in-production-12345}
    networks:
      - mav-network
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.1.6:8000
    depends_on:
      - backend
    networks:
      - mav-network

volumes:
  mysql_data:

networks:
  mav-network:
    driver: bridge